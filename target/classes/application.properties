# Sửa lại thành đường dẫn này để Render có quyền ghi file
spring.datasource.url=jdbc:postgresql://localhost:5432/web_thu_chi
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update
# Kích hoạt Flyway
# Cấu hình Hibernate cho Postgres
spring.jpa.show-sql=true

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
# Không baseline trên DB mới, để Flyway chạy V1 và tạo bảng payments
# Sửa lại dòng 13
spring.flyway.baseline-on-migrate=true

# Thêm dòng này để nếu có lỗi nhỏ nó sẽ tự fix metadata
spring.flyway.repair-on-migrate=true
# Đảm bảo Hibernate không can thiệp vào cấu trúc bảng (đã có Flyway lo)



server.port=8080

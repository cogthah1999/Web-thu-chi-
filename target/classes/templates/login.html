<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Đăng nhập Ví Điện Tử</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(120deg, #3498db, #8e44ad); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #27ae60; }
        .error { color: #e74c3c; margin-bottom: 15px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>VÍ ĐIỆN TỬ 💰</h2>
        <!-- Thông báo nếu nhập sai mật khẩu -->
        <div th:if="${param.error}" class="error">Sai tài khoản hoặc mật khẩu!</div>
        
        <form th:action="@{/login}" method="post">
            <input type="text" name="username" placeholder="Tên đăng nhập" required>
            <input type="password" name="password" placeholder="Mật khẩu" required>
            <button type="submit">ĐĂNG NHẬP</button>
        </form>
    </div>
</body>
</html>
